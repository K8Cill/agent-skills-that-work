name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint skills (frontmatter + spec)
        run: python scripts/lint_skills.py

      - name: Check description collisions
        run: python scripts/check_collisions.py

      - name: Validate plugin manifest
        run: python scripts/validate_manifest.py
